---
trajectory_weights_params:
  trajectory_name:
    type: string
    default_value: "sine_wave_configuration_space"
    description: "Choose which trajectory to use."
    validation:
      one_of<>:
        [
          [
            "sine_wave_configuration_space",
            "sine_wave_cartesian_space",
            "sine_wave_cartesian_space_weight_increasing",
            "generic_trajectory",
            "generic_visual_servoing_trajectory",
          ],
        ]
  mask:
    type: bool_array
    default_value: [True, True, True, True, True, True]
    description: "Mask for the cartesian space sine wave DoF to update from the Inverse Kinematic."
  ee_frame_name:
    type: string
    description: "End-effector name."
    validation:
      not_empty<>: []
  dt:
    type: double
    default_value: 0.01
    description: "discretization step of the trajectory."
  w_q:
    type: double_array
    default_value: [1.0]
    description: "Weights for joint configuration cost."
  w_qdot:
    type: double_array
    default_value: [0.1]
    description: "Weights for joint velocity cost."
  w_qddot:
    type: double_array
    default_value: [0.0001]
    description: "Weights for joint acceleration cost."
  w_robot_effort:
    type: double_array
    default_value: [0.001]
    description: "Weights for control cost."
  w_pose:
    type: double_array
    default_value: [0.1]
    description: "Weights for end-effector position cost."
  w_increasing:
    max_weight:
      type: double
      default_value: 100.0
      description: "Maximum weight."
    percent:
      type: double
      default_value: 0.9
      description: "Percent of the maximum weigth reached when visual servoing time is equal to time_reach_percent."
    time_reach_percent:
      type: double
      default_value: 6.0
      description: "when visual servoing time is equal to time_reach_percent, the weight sent is the percent of the maximum weigth reached."
  sine_wave:
    period:
      type: double_array
      default_value: [4.0]
      description: "Period of the sinusoid in seconds."
    scale_duration:
      type: double_array
      default_value: [1.0]
      description: "Time for the Quintic polynomial to go from 0 to default_value."
    amplitude:
      type: double_array
      default_value: [0.2]
      description: "Amplitude of the sinusoid."
  generic_trajectory_visual_servoing:
    start_visual_servoing_time_threshold:
      type: double
      default_value: 1.0
      description: "When time before being at goal is below this threshold, activate visual servoing."
